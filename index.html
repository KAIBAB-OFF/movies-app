<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Liste des pays</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <h1>LIST OF MOVIES</h1>

    <div id="vue-liste">
        <input id="search-input" type="text" placeholder="Chercher un film...">
        <div id="films-container"></div>
        <div id="pagination">
            <button id="btn-prev">←  Précédent</button>
            <span id="page-info">Page 1</span>
            <button id="btn-next">Suivant  →</button>
        </div>  
    </div>

    <div id="vue-detail" style="display:none">
        <button id="back-button">← Retour</button>
        <div id="detail-container"></div>
    </div>
    
    <div id="message-vide" style="display:none">
        <h1>Aucun film trouvé.</h1>
    </div>

   

    <script type="module" src="src/main.ts"></script>
</body>
</html>
